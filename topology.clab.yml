name: ot-defence-workbench

topology:
  nodes:
    north:
      kind: bridge

    south:
      kind: bridge

    client:
      kind: linux
      image: ot-workbench/client:latest
      network-mode: none

    probe:
      kind: linux
      image: ot-workbench/probe:latest
      network-mode: none

    asset:
      kind: linux
      image: ot-workbench/asset:latest
      network-mode: none

    boundary:
      kind: linux
      image: ot-workbench/boundary:latest
      network-mode: none

  links:
    - endpoints: ["client:eth1", "north:client"]
    - endpoints: ["probe:eth1", "north:probe"]
    - endpoints: ["boundary:eth1", "north:boundary"]
    - endpoints: ["boundary:eth2", "south:boundary"]
    - endpoints: ["asset:eth1", "south:asset"]