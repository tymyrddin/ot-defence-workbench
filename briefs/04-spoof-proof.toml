[[brief.links]]
title = "Modbus"
url = "https://blue.tymyrddin.dev/docs/ot/protocols/modbus"

[[checks]]
runner = "probe"
name = "direct-reach"
script = "/checks/01-direct-reach.py"
expect = "block"
protocol = "modbus"

[[checks]]
runner = "probe"
name = "spoof-client-ip"
script = "/checks/04-spoof-client-ip.py"
expect = "block"
protocol = "modbus"

[[checks]]
runner = "client"
name = "read-via-boundary"
script = "/checks/04-read-via-boundary.py"
expect = "pass"
protocol = "modbus"
