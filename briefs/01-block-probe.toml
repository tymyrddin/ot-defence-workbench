[brief]
number = 1
slug = "block-probe"
title = "Block the probe, keep the client"
requirement = """
The probe cannot reach the asset. The client's reads still succeed.

The boundary starts as a transparent bridge, all traffic passes through
unchecked. Your task: make it selective.

Modbus carries no authentication and no integrity check. Anyone who reaches
port 502 can read or write any register. In January 2024, FrostyGoop sent
write commands to district heating controllers in Lviv over plain Modbus TCP.
No exploit. No credential. Port 502 was reachable and the controllers
complied. Around 600 buildings lost heating for two days.

The network is the only control surface. Place a component on the boundary
that enforces it. Several architectures satisfy this brief; the check asks
only whether the outcome holds.
"""

[[brief.links]]
title = "Modbus"
url = "https://blue.tymyrddin.dev/docs/ot/protocols/modbus"

[[brief.links]]
title = "FrostyGoop"
url = "https://blue.tymyrddin.dev/docs/ot/incidents/frostygoop"

[[brief.links]]
title = "IT/OT boundary"
url = "https://blue.tymyrddin.dev/docs/ot/architecture/boundary"

[[checks]]
runner = "probe"
name = "direct-reach"
script = "/checks/01-direct-reach.py"
expect = "block"
protocol = "modbus"

[[checks]]
runner = "probe"
name = "anon-read"
script = "/checks/02-anon-read.py"
expect = "block"
protocol = "modbus"

[[checks]]
runner = "probe"
name = "write-attempt"
script = "/checks/03-write-attempt.py"
expect = "block"
protocol = "modbus"

[[checks]]
runner = "client"
name = "client-read"
script = "/checks/01-client-read.py"
expect = "pass"
protocol = "modbus"
