[brief]
number = 14
slug = "iec104-sa"
title = "IEC 104 security authentication"
requirement = """
The probe can reach the controller, complete the STARTDT handshake, and send a
C_SC_NA_1 circuit-breaker trip command. The asset rejects the command because
the I-frame carries no valid MAC. The boundary is transparent.

Briefs 10 and 11 stopped the trip command at the boundary — at the port level
and at the protocol type level respectively. Both are network controls: the asset
never sees the command. Brief 12 moves the defence to the asset itself.

IEC 62351-5 defines Security Authentication for IEC 60870-5 protocols. The
authenticating party appends a truncated HMAC to each I-frame carrying a control
command. The asset verifies the MAC before acting on the ASDU. A valid MAC
requires knowledge of the shared key; the probe has no key and therefore cannot
forge one.

The boundary passes all IEC 104 traffic. The probe connects, sends STARTDT, and
sends the same trip command it sends in every IEC 104 brief. The command reaches
the asset. The asset checks for a valid MAC, finds none, and closes the
connection. The probe's recv() raises ConnectionResetError.

The authorised client sends the same command with a correct HMAC. The asset
verifies it and acknowledges with an S-frame.

The cross-brief comparison is the point: brief 10 held because the boundary
blocked the port. Brief 11 held because the boundary blocked the type ID.
Brief 12 holds because the asset validated the command — and the boundary did
nothing at all.
"""

[[brief.links]]
title = "IEC 62351-5 security authentication"
url = "https://blue.tymyrddin.dev/docs/ot/protocols/iec-60870-5-104"

[[brief.links]]
title = "Ukraine grid incident"
